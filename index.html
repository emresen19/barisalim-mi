<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barışalım mı?</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #fff5f7 0%, #ffe4ec 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      min-height: 420px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      padding: 40px 28px;
      position: relative;
      text-align: center;
    }

    .date {
      font-size: 14px;
      color: #a36b7d;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    h1 {
      font-size: clamp(30px, 5vw, 48px);
      color: #7a3048;
      margin-bottom: 12px;
      line-height: 1.15;
    }

    p {
      font-size: 18px;
      color: #6b4a57;
      max-width: 520px;
      margin: 0 auto 34px;
      line-height: 1.6;
    }

    .buttons-wrap {
      position: relative;
      width: 100%;
      height: 180px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.25s ease;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    #yesBtn {
      background: #ff4d8d;
      color: white;
      padding: 18px 42px;
      font-size: 22px;
      transform: scale(1);
      position: relative;
      z-index: 2;
    }

    #yesBtn:hover {
      transform: scale(1.06);
    }

    #noBtn {
      background: white;
      color: #d14b7f;
      border: 2px solid #ffd1e0;
      padding: 16px 34px;
      font-size: 20px;
      position: absolute;
      left: 58%;
      top: 52%;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    .center-area {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
    }

    .final {
      display: none;
      animation: fadeIn 0.5s ease forwards;
    }

    .final h2 {
      font-size: clamp(34px, 6vw, 58px);
      color: #ff4d8d;
      margin-bottom: 14px;
    }

    .final p {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .hearts {
      font-size: 34px;
      margin-top: 16px;
      animation: float 1.4s infinite ease-in-out alternate;
    }

    .tiny-note {
      margin-top: 16px;
      font-size: 14px;
      color: #a36b7d;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(-8px); }
    }

    @media (max-width: 600px) {
      .card {
        padding: 28px 18px;
        min-height: 500px;
      }

      .buttons-wrap {
        height: 240px;
      }

      #yesBtn {
        font-size: 20px;
        padding: 16px 34px;
      }

      #noBtn {
        font-size: 18px;
        padding: 14px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="card" id="mainCard">
    <div id="questionArea">
      <div class="date">16.10.2024</div>
      <h1>Seni üzdüğüm için özür dilerim.</h1>
      <p>
        Gerçekten kırdıysam bunu telafi etmek istiyorum.
        Bir şans daha verir misin… barışalım mı?
      </p>

      <div class="buttons-wrap" id="buttonsWrap">
        <div class="center-area">
          <button id="yesBtn">Evet</button>
        </div>
        <button id="noBtn">Hayır</button>
      </div>

      <div class="tiny-note">Bu sefer kaçış yok gibi :)</div>
    </div>

    <div class="final" id="finalArea">
      <h2>Yuppi 🤍</h2>
      <p>Bir şans verdiğin için teşekkür ederim.</p>
      <p>Seni üzmek değil, mutlu etmek istiyorum.</p>
      <div class="hearts">🤍✨🤍</div>
      <div class="tiny-note">Bu ekranı görünce sarılma hakkım doğdu.</div>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const buttonsWrap = document.getElementById("buttonsWrap");
    const questionArea = document.getElementById("questionArea");
    const finalArea = document.getElementById("finalArea");

    let noCount = 0;
    let yesScale = 1;

    const noTexts = [
      "Emin misin?",
      "Bir daha düşün",
      "Bence tekrar bak",
      "Kalbim kırılıyor :(",
      "Son kararın mı?",
      "Bak evet daha mantıklı",
      "Hayır deme ya",
      "Bence evet basılmalı",
      "Mecbur evet gibi duruyor",
    ];

    function moveNoButton() {
      const wrapRect = buttonsWrap.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = wrapRect.width - btnRect.width - 10;
      const maxY = wrapRect.height - btnRect.height - 10;

      const x = Math.max(10, Math.random() * maxX);
      const y = Math.max(10, Math.random() * maxY);

      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
      noBtn.style.transform = "translate(0,0)";
    }

    noBtn.addEventListener("click", () => {
      noCount++;

      yesScale += 0.18;
      yesBtn.style.transform = `scale(${yesScale})`;

      noBtn.textContent = noTexts[Math.min(noCount - 1, noTexts.length - 1)];

      if (noCount < 8) {
        moveNoButton();
      } else {
        noBtn.style.opacity = "0";
        noBtn.style.pointerEvents = "none";
        noBtn.textContent = "";
        yesBtn.style.transform = "scale(2.2)";
      }
    });

    yesBtn.addEventListener("click", () => {
      questionArea.style.display = "none";
      finalArea.style.display = "block";
    });
  </script>
</body>
</html>
